<!DOCTYPE html>
<html lang="en">
<head>
    <title>Order Confirmed - Vora</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <style>
        .success-page {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #000;
            color: white;
            text-align: center;
            font-family: sans-serif;
        }
        .success-icon {
            font-size: 100px;
            color: #03a685;
            margin-bottom: 20px;
            animation: pop 0.5s ease-out;
        }
        @keyframes pop {
            0% { transform: scale(0); }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        p { color: #888; margin-bottom: 30px; }
        .btn-home {
            padding: 15px 40px;
            background: #ff3f6c;
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s;
        }
        .btn-home:hover { background: #ff527b; }
    </style>
</head>
<body class="success-page">
    <span class="material-symbols-outlined success-icon">check_circle</span>
    <h1>Congratulations!</h1>
    <p>Your order has been placed successfully.<br>Thank you for shopping with Vora, a Global Mercantile brand.</p>
    <a href="index.html" class="btn-home">CONTINUE SHOPPING</a>
</body>
</html>
